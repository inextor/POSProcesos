<div class="container-fluid pt-4">
	<div class="row">
		<div class="col-12">
			<div class="card shadow-sm">
				<div class="card-header bg-primary text-white">
					<h4 class="mb-0">Ventas de Artículos por Cliente Facturado</h4>
				</div>
				<div class="card-body">
					<div class="row g-3">
						<div class="col-md-3">
							<label class="form-label">Fecha Inicio</label>
							<input type="datetime-local" class="form-control" [(ngModel)]="start_date">
						</div>
						<div class="col-md-3">
							<label class="form-label">Fecha Fin</label>
							<input type="datetime-local" class="form-control" [(ngModel)]="end_date">
						</div>
						<div class="col-md-4">
							<label class="form-label">Sucursal</label>
							<select class="form-select" [(ngModel)]="store_id">
								<option [ngValue]="null">Todas las sucursales</option>
								<option *ngFor="let s of store_list" [ngValue]="s.id">{{s.name}}</option>
							</select>
						</div>
						<div class="col-md-2 d-flex align-items-end">
							<button class="btn btn-primary w-100" (click)="generateReport()" [disabled]="is_loading">
								<span *ngIf="is_loading" class="spinner-border spinner-border-sm me-2"></span>
								Generar Excel
							</button>
						</div>
					</div>

					<div *ngIf="is_loading" class="mt-4">
						<div class="progress">
							<div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
								[style.width.%]="progress" aria-valuenow="progress" aria-valuemin="0" aria-valuemax="100">
								{{progress}}%
							</div>
						</div>
						<p class="text-center mt-2">{{progress_message}}</p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
